<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registrar Gasto</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "primary-dark": "#0fb345",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1a3324",
                        "text-main": "#0d1b12",
                        "text-secondary": "#4c9a66",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar for cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }
        .toggle-checkbox:checked {
            right: 0;
            border-color: #13ec5b;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #13ec5b;
        }
        
        /* Hide calendar by default on small screens, show on toggle */
        .calendar-popover {
            display: none;
        }
        .calendar-popover.active {
            display: block;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-text-main dark:text-white min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 lg:p-8">
<!-- Main Container -->
<div class="w-full max-w-4xl bg-surface-light dark:bg-surface-dark rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row min-h-[600px]">
<!-- Left Column: Primary Inputs -->
<div class="flex-1 p-6 sm:p-8 flex flex-col gap-6 border-r border-gray-100 dark:border-gray-800">
<!-- Header -->
<div class="flex justify-between items-start">
<div>
<h1 class="text-3xl font-bold tracking-tight text-text-main dark:text-white">Registrar Gasto</h1>
<p class="text-text-secondary dark:text-gray-400 text-sm mt-1">Ingresa los detalles de tu nuevo movimiento</p>
</div>
<button class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Large Amount Input -->
<div class="mt-4">
<label class="block text-sm font-medium text-text-secondary dark:text-gray-400 mb-2">Monto del gasto</label>
<div class="relative flex items-center">
<span class="absolute left-0 top-1/2 -translate-y-1/2 text-4xl font-bold text-text-main dark:text-white pl-4">₡</span>
<input autofocus="" class="w-full bg-background-light dark:bg-background-dark border-0 rounded-2xl py-6 pl-12 pr-6 text-5xl font-bold text-text-main dark:text-white placeholder-gray-300 focus:ring-2 focus:ring-primary focus:outline-none transition-shadow" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Grid Form -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-2">
<!-- Category -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-text-main dark:text-gray-200">Categoría</label>
<div class="relative">
<select class="w-full h-12 pl-11 pr-4 bg-white dark:bg-background-dark border border-gray-200 dark:border-gray-700 rounded-xl text-base focus:border-primary focus:ring-primary appearance-none cursor-pointer">
<option disabled="" selected="" value="">Seleccionar</option>
<option value="food">Comida &amp; Bebida</option>
<option value="transport">Transporte</option>
<option value="home">Hogar</option>
<option value="entertainment">Entretenimiento</option>
</select>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none">category</span>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-xl">expand_more</span>
</div>
</div>
<!-- Date -->
<div class="flex flex-col gap-2 relative">
<label class="text-sm font-medium text-text-main dark:text-gray-200">Fecha</label>
<div class="relative">
<input class="w-full h-12 pl-11 pr-4 bg-white dark:bg-background-dark border border-gray-200 dark:border-gray-700 rounded-xl text-base focus:border-primary focus:ring-primary cursor-pointer text-gray-700 dark:text-gray-200" type="date"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none">calendar_today</span>
</div>
</div>
</div>
<!-- Payment Method Segmented Control -->
<div class="flex flex-col gap-2 mt-2">
<label class="text-sm font-medium text-text-main dark:text-gray-200">Método de pago</label>
<div class="flex p-1 bg-background-light dark:bg-background-dark rounded-xl">
<label class="flex-1 relative cursor-pointer group">
<input checked="" class="sr-only peer" name="payment_method" type="radio"/>
<div class="py-2.5 px-3 rounded-lg text-center text-sm font-medium text-gray-500 peer-checked:bg-white dark:peer-checked:bg-surface-dark peer-checked:text-primary peer-checked:shadow-sm transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">payments</span>
                            Efectivo
                        </div>
</label>
<label class="flex-1 relative cursor-pointer group">
<input class="sr-only peer" name="payment_method" type="radio"/>
<div class="py-2.5 px-3 rounded-lg text-center text-sm font-medium text-gray-500 peer-checked:bg-white dark:peer-checked:bg-surface-dark peer-checked:text-primary peer-checked:shadow-sm transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">credit_card</span>
                            Tarjeta
                        </div>
</label>
<label class="flex-1 relative cursor-pointer group">
<input class="sr-only peer" name="payment_method" type="radio"/>
<div class="py-2.5 px-3 rounded-lg text-center text-sm font-medium text-gray-500 peer-checked:bg-white dark:peer-checked:bg-surface-dark peer-checked:text-primary peer-checked:shadow-sm transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">phonelink_ring</span>
                            SINPE
                        </div>
</label>
</div>
</div>
<!-- Description -->
<div class="flex flex-col gap-2 mt-2">
<label class="text-sm font-medium text-text-main dark:text-gray-200">Nota (Opcional)</label>
<textarea class="w-full p-3 bg-white dark:bg-background-dark border border-gray-200 dark:border-gray-700 rounded-xl text-base focus:border-primary focus:ring-primary resize-none placeholder-gray-400" placeholder="Añade una descripción..." rows="2"></textarea>
</div>
</div>
<!-- Right Column: Settings & Actions -->
<div class="w-full md:w-[320px] bg-gray-50 dark:bg-[#152a1d] p-6 sm:p-8 flex flex-col gap-6 justify-between border-l border-gray-100 dark:border-gray-800">
<div class="flex flex-col gap-6">
<h2 class="text-lg font-semibold text-text-main dark:text-white">Opciones</h2>
<!-- Toggles Group -->
<div class="space-y-4">
<!-- Gasto del hogar -->
<label class="flex items-center justify-between cursor-pointer group">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-white dark:bg-surface-dark flex items-center justify-center text-gray-500 group-hover:text-primary transition-colors shadow-sm">
<span class="material-symbols-outlined text-lg">home</span>
</div>
<span class="text-sm font-medium text-text-main dark:text-gray-200">Gasto del hogar</span>
</div>
<div class="relative inline-block w-11 h-6 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300 left-0.5 top-0.5 border-gray-300" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300"></label>
</div>
</label>
<!-- Compartido -->
<label class="flex items-center justify-between cursor-pointer group">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-white dark:bg-surface-dark flex items-center justify-center text-gray-500 group-hover:text-primary transition-colors shadow-sm">
<span class="material-symbols-outlined text-lg">group</span>
</div>
<span class="text-sm font-medium text-text-main dark:text-gray-200">Compartido</span>
</div>
<div class="relative inline-block w-11 h-6 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300 left-0.5 top-0.5 border-gray-300" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300"></label>
</div>
</label>
<!-- Recurrente with Expandable Section -->
<div class="flex flex-col gap-3">
<label class="flex items-center justify-between cursor-pointer group">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-white dark:bg-surface-dark flex items-center justify-center text-gray-500 group-hover:text-primary transition-colors shadow-sm">
<span class="material-symbols-outlined text-lg">update</span>
</div>
<span class="text-sm font-medium text-text-main dark:text-gray-200">Recurrente</span>
</div>
<div class="relative inline-block w-11 h-6 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox peer absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300 left-0.5 top-0.5 border-gray-300" id="recurring-toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300 peer-checked:bg-primary" for="recurring-toggle"></label>
</div>
</label>
<!-- Hidden frequency options (simulated with peer-checked logic in CSS normally, here using display for simplicity in static HTML but styled to look ready) -->
<div class="hidden peer-checked:flex flex-col gap-2 pl-11 pt-1 transition-all">
<select class="w-full text-sm bg-white dark:bg-surface-dark border-gray-200 dark:border-gray-700 rounded-lg py-1.5 px-2">
<option>Mensual</option>
<option>Semanal</option>
<option>Anual</option>
</select>
</div>
</div>
</div>
<!-- File Upload -->
<div class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">
<label class="text-sm font-medium text-text-main dark:text-gray-200 mb-2 block">Comprobante</label>
<div class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-4 flex flex-col items-center justify-center text-center cursor-pointer hover:border-primary hover:bg-primary/5 transition-all group">
<span class="material-symbols-outlined text-gray-400 group-hover:text-primary mb-1">cloud_upload</span>
<p class="text-xs text-gray-500 dark:text-gray-400">
<span class="font-semibold text-primary">Clic para subir</span> o arrastra
                        </p>
<p class="text-[10px] text-gray-400 mt-1">PDF, PNG, JPG (Max 5MB)</p>
</div>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-3 mt-auto pt-6">
<button class="w-full h-12 bg-primary hover:bg-primary-dark text-black font-semibold rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 transform active:scale-[0.98]">
<span class="material-symbols-outlined text-[20px]">check</span>
                    Guardar gasto
                </button>
<button class="w-full h-12 bg-transparent hover:bg-gray-100 dark:hover:bg-white/5 text-gray-600 dark:text-gray-300 font-medium rounded-xl transition-colors">
                    Cancelar
                </button>
</div>
</div>
</div>
</body></html>
